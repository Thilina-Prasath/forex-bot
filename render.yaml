services:
  - type: cron
    name: forex-signal-bot
    runtime: python
    schedule: "2 */4 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python cron_run.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false